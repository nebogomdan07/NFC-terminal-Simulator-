<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Симулятор терміналу з NFC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --screen-bg: #010409;
            --text-color: #e6edf3;
            --placeholder-color: #484f58;
            --accent-color: #2f81f7;
            --success-color: #238636;
            --error-color: #f85149;
            --button-bg: #21262d;
            --button-border: #30363d;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Roboto Mono', monospace;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--screen-bg);
            box-sizing: border-box;
        }

        /* --- Екран вводу суми --- */
        #amount-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        #amount-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid var(--button-border);
            color: var(--text-color); font-size: 4em; font-weight: 700;
            text-align: center; padding: 10px 0; outline: none;
            box-sizing: border-box; transition: border-color 0.3s;
        }
        #amount-input:focus { border-bottom-color: var(--accent-color); }
        #amount-input::placeholder { color: var(--placeholder-color); }
        #amount-input::-webkit-outer-spin-button, #amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #amount-input[type=number] { -moz-appearance: textfield; }
        
        .currency-symbol {
            position: absolute; right: 0; bottom: 20px;
            font-size: 2.5em; font-weight: 700; color: var(--placeholder-color);
        }

        #pay-btn {
            width: 100%; max-width: 400px; padding: 20px; margin-top: 40px;
            font-size: 1.5em; font-weight: bold; color: white;
            background-color: var(--success-color); border: none;
            border-radius: 12px; cursor: pointer; transition: transform 0.1s, background-color 0.2s;
        }
        #pay-btn:active { transform: scale(0.98); }
        
        .prompt {
            font-size: 1.2em; color: var(--placeholder-color);
            text-align: center; height: 40px; margin-top: 20px;
        }

        /* --- Екран оплати --- */
        .payment-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--screen-bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
        }
        .payment-overlay.active { opacity: 1; visibility: visible; }

        .progress-dots {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .dot {
            width: 20px; height: 20px;
            background-color: var(--button-border);
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        .dot.active { background-color: var(--accent-color); }

        .success-checkmark {
            width: 120px; height: 120px; border-radius: 50%; display: none;
            stroke-width: 5; stroke: var(--success-color); stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px var(--success-color);
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }
        .success-checkmark__circle {
            stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 5;
            stroke-miterlimit: 10; stroke: var(--success-color); fill: none;
            animation: stroke .6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        .success-checkmark__check {
            transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48;
            animation: stroke .3s cubic-bezier(0.65, 0, 0.45, 1) .8s forwards;
        }
        
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 60px var(--success-color); } }

    </style>
</head>
<body>

    <div class="terminal-container">
        <div id="payment-view" class="payment-overlay">
            <div class="progress-dots" id="progress-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <svg class="success-checkmark" id="success-animation" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
              <circle class="success-checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
              <path class="success-checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
            <p class="prompt" id="payment-prompt">Прикладіть картку або телефон</p>
        </div>
        
        <div id="amount-view">
            <p class="prompt" id="main-prompt">Введіть суму для оплати</p>
            <div class="input-wrapper">
                <input 
                    type="number" 
                    id="amount-input" 
                    placeholder="0.00"
                    step="0.01" 
                    min="0.01"
                    pattern="\d*(\.\d{0,2})?$"
                >
                <span class="currency-symbol">₴</span>
            </div>
            <button id="pay-btn">СПЛАТИТИ</button>
        </div>
    </div>

    <audio id="success-sound" src="data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU2LjQwLjEwMQAAAAAAAAAAAAAA//tAwAAAAAAAAAAAAAAAAAAAAAA//tAwBgoYAAAAAAAAAAAAFBNSUt6AAAAAAAAAAAAAAAABEVVVVUUxBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tAwBgoYAAAAAAAAAAAAFBNSUt6AAAAAAAAAAAAAAAABEVVVVUUxBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tAQA8oYAAAADD0xBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV     <script>
        document.addEventListener('DOMContentLoaded', () => {
            const amountInput = document.getElementById('amount-input');
            const mainPrompt = document.getElementById('main-prompt');
            const payBtn = document.getElementById('pay-btn');
            
            const paymentView = document.getElementById('payment-view');
            const amountView = document.getElementById('amount-view');
            const paymentPrompt = document.getElementById('payment-prompt');
            const successAnimation = document.getElementById('success-animation');
            const progressDots = document.getElementById('progress-dots').children;

            const nfcSound = document.getElementById('nfc-sound');
            const successSound = document.getElementById('success-sound');
            
            let nfcController = null; // Контролер для зупинки сканування

            const playSound = (sound) => {
                sound.currentTime = 0;
                sound.play();
            };

            payBtn.addEventListener('click', () => {
                const amountValue = parseFloat(amountInput.value);

                if (!isNaN(amountValue) && amountValue > 0) {
                    mainPrompt.textContent = 'Введіть суму для оплати';
                    mainPrompt.style.color = 'var(--placeholder-color)';
                    
                    amountView.style.opacity = '0';
                    amountView.style.pointerEvents = 'none';
                    
                    setTimeout(() => {
                        paymentView.classList.add('active');
                        startNfcScan();
                    }, 300);
                } else {
                    mainPrompt.textContent = 'Введіть коректну суму';
                    mainPrompt.style.color = 'var(--error-color)';
                }
            });
            
            // Функція запуску NFC сканування
            async function startNfcScan() {
                if ('NDEFReader' in window) {
                    try {
                        const nfcReader = new NDEFReader();
                        nfcController = new AbortController(); // Створюємо контролер для зупинки
                        
                        await nfcReader.scan({ signal: nfcController.signal });

                        paymentPrompt.textContent = 'Прикладіть картку або телефон';

                        nfcReader.addEventListener('reading', () => {
                            // Зупиняємо подальше сканування, щоб подія не спрацювала двічі
                            nfcController.abort();
                            simulatePaymentProcess();
                        });

                        nfcReader.addEventListener('error', (event) => {
                            console.error("Помилка NFC: ", event);
                            paymentPrompt.textContent = 'Помилка NFC. Спробуйте знову';
                            setTimeout(resetTerminal, 3000);
                        });

                    } catch (error) {
                        console.error("Не вдалося запустити NFC: ", error);
                        paymentPrompt.textContent = 'Увімкніть NFC або надайте дозвіл';
                        // Можна додати fallback, якщо NFC не вдалося запустити
                    }
                } else {
                    paymentPrompt.textContent = 'Web NFC не підтримується';
                    // Тут можна імітувати успішну оплату через 3 секунди для пристроїв без NFC
                    setTimeout(simulatePaymentProcess, 3000);
                }
            }

            const simulatePaymentProcess = () => {
                // 1. Контакт з NFC
                playSound(nfcSound);
                navigator.vibrate(200); // Вібрація при контакті
                
                // Запалюємо крапочки
                for(const dot of progressDots) { dot.classList.add('active'); }

                // 2. Симуляція етапів з'єднання (5 секунд)
                paymentPrompt.textContent = 'З\'єднання...';
                
                setTimeout(() => {
                    paymentPrompt.textContent = 'З\'єднання з банком...';
                }, 1500);

                setTimeout(() => {
                    paymentPrompt.textContent = 'Операція успішна!';
                }, 3500);

                // 3. Анімація успіху
                setTimeout(() => {
                    playSound(successSound);
                    document.getElementById('progress-dots').style.display = 'none';
                    successAnimation.style.display = 'block';
                    paymentPrompt.textContent = 'ЗАБЕРІТЬ КАРТКУ';
                    paymentPrompt.style.color = 'var(--success-color)';
                    paymentPrompt.style.fontWeight = 'bold';
                }, 5000);

                // 4. Повернення до початкового екрану
                setTimeout(() => {
                    resetTerminal();
                }, 8000);
            };
            
            const resetTerminal = () => {
                // Якщо сканування ще активне, зупиняємо його
                if (nfcController) {
                    nfcController.abort();
                    nfcController = null;
                }

                paymentView.classList.remove('active');
                amountView.style.opacity = '1';
                amountView.style.pointerEvents = 'auto';
                
                amountInput.value = '';
                
                // Скидання елементів екрану оплати
                mainPrompt.textContent = 'Введіть суму для оплати';
                mainPrompt.style.color = 'var(--placeholder-color)';
                paymentPrompt.textContent = 'Прикладіть картку або телефон';
                paymentPrompt.style.color = 'var(--placeholder-color)';
                paymentPrompt.style.fontWeight = 'normal';
                
                document.getElementById('progress-do
